# TEMPORARY — falsifiability harness for ip#127 / noorinalabs-main#947.
#
# Proves whether `no-cache-filters: base` actually forces the digest-pinned
# base stage's `apt-get -y upgrade` to re-execute, WITHOUT publishing anything.
#
# Why this exists rather than a `workflow_dispatch` of ghcr-publish.yml: that
# workflow tags `stg-<short>` + `stg-latest` on a manual dispatch, and
# noorinalabs-deploy compose/docker-compose.prod.yml defaults INGEST_IMAGE_TAG
# to `stg-latest`. Dispatching it from a feature branch to buy a pre-merge proof
# would move a prod-adjacent tag. This harness instead:
#
#   * push: false      — nothing is pushed to GHCR. No tag can move.
#   * load: true       — the image lands in the runner's local docker daemon,
#                        so Trivy can scan the real built artifact.
#   * NO cache-to      — reads the shared `workers` GHA cache but never writes
#                        to it, so a proof run cannot pollute the real publish.
#
# It runs the SAME build TWICE against the SAME cache — control and treatment —
# because "the layer rebuilt" is only evidence if the layer WOULD otherwise have
# been served from cache. One run without the flag and one with it is what makes
# the two outcomes distinguishable:
#
#   control   (no no-cache-filters) -> apt layer MUST report CACHED, Trivy MUST
#                                      report the 10 frozen HIGH CVEs
#   treatment (no-cache-filters: base) -> apt layer MUST NOT report CACHED, Trivy
#                                      MUST report 0 HIGH/CRITICAL
#
# `build-essential` + `curl` are still installed in this PR, so linux-libc-dev
# and libssh2-1t64 are still in the image and still scanned — which is what keeps
# the Trivy signal independent of the CACHED signal.
#
# DELETE THIS FILE once the evidence is captured. The run logs are the artifact.

name: Cache proof (ip#127, temporary)

# Push-triggered on this branch ONLY. `workflow_dispatch` alone is not usable
# here: GitHub only registers a dispatchable workflow once the file exists on the
# DEFAULT branch, so dispatching a proof harness that lives on a feature branch
# 404s. Scoping a push trigger to this one branch is what makes it runnable
# pre-merge — and it cannot fire anywhere else.
on:
  workflow_dispatch:
  push:
    branches:
      - "B.Henriksen/0127-cached-apt-layer"

permissions:
  contents: read

jobs:
  proof:
    name: "apt layer: ${{ matrix.label }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: control (no flag — layer SHOULD be CACHED)
            filters: ""
          - label: treatment (no-cache-filters base — layer SHOULD rebuild)
            filters: base
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # Same pinned action + same cache scope as ghcr-publish.yml, so this reads
      # the exact frozen layer the real publish reads. push:false / no cache-to.
      - name: Build (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ip127-cache-proof:${{ strategy.job-index }}
          cache-from: type=gha,scope=workers
          no-cache-filters: ${{ matrix.filters }}

      - name: Trivy scan (local image, never pushed)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ip127-cache-proof:${{ strategy.job-index }}
          format: table
          exit-code: "0" # report, do not fail — the COUNT is the evidence
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Installed versions of the two CVE-bearing packages
        run: |
          echo "### ${{ matrix.label }}" >> "$GITHUB_STEP_SUMMARY"
          docker run --rm --entrypoint sh ip127-cache-proof:${{ strategy.job-index }} \
            -c 'dpkg-query -W -f="${Package} ${Version}\n" libssh2-1t64 linux-libc-dev 2>/dev/null' \
            | tee -a "$GITHUB_STEP_SUMMARY"
