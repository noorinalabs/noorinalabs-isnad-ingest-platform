# Publish the multi-worker container image to GitHub Container Registry (GHCR).
#
# Image:
#   ghcr.io/noorinalabs/noorinalabs-isnad-ingest-platform   (all 4 worker stages)
#
# Satisfies the deploy#440 contract: a single image bundling
# workers.{dedup,enrich,normalize,ingest}, tagged stg-*, whose pipeline stage
# is selected by each compose service's `command:` (the profile-gated
# dedup/enrich/normalize/graph-load workers in
# noorinalabs-deploy compose/docker-compose.prod.yml).
#
# Triggers:
#   - push to main                       — republishes :latest + :stg-* + :stg-latest
#   - tag push (v* | phase*-wave*)        — release/wave tags
#   - workflow_dispatch (manual)          — the GATED staging-publish path: lets the
#                                           release coordinator publish stg-<short> +
#                                           stg-latest from the active wave branch so
#                                           the profiled workers can be brought up on
#                                           the box BEFORE this branch merges to main
#                                           (the main#601 E2E moment). See RUNBOOK.md
#                                           "Deploy procedure".
#
# NO deploy fan-in. Unlike isnad-graph/user-service, this workflow does NOT fire
# a repository_dispatch to noorinalabs-deploy:
#   - deploy-stg.yml declares only `deploy-noorinalabs-isnad-graph` /
#     `deploy-noorinalabs-user-service` dispatch types — there is no ingest handler.
#   - The worker services are profile-gated (`profiles: ["pipeline"]`); deploy-stg's
#     plain `docker compose ... up -d --remove-orphans` does NOT start them.
# Bringing the workers up is a deliberate, gated `docker compose --profile pipeline
# up -d` on the box — the runbook step, not an auto-deploy. See RUNBOOK.md.

name: Publish to GHCR

on:
  push:
    branches: [main]
    tags:
      - "v*"
      - "phase*-wave*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: noorinalabs/noorinalabs-isnad-ingest-platform

jobs:
  build-and-push:
    name: Build and push (workers)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (ingest-platform)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          # Org image-tag contract (mirrors isnad-graph ghcr-publish.yml):
          #   sha-<short>   — immutable, one per push; every event
          #   latest        — mutable pointer; main-branch push + semver tags
          #   stg-<short>   — immutable, stg namespace; push-to-main OR manual
          #                   workflow_dispatch (the gated wave-branch publish)
          #   stg-latest    — moving pointer to the newest stg-<short>; same enable
          # prod-* tags are written by the noorinalabs-deploy promote workflow ONLY.
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=stg-,format=short,enable=${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
            type=raw,value=stg-latest,enable=${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile
          # amd64 only: the VPS is amd64, the workers are pure python/uv, and
          # there is no arm64 consumer today. A cross-arch QEMU build would be
          # ~10x slower for no benefit (same rationale as the isnad-graph
          # frontend). Re-enable arm64 when ARM worker nodes arrive.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cite layers by their `[base N/9]` label, NEVER by buildx vertex number
          # (`#10`, `#18`, …): those are assigned in solve order and are NOT stable
          # across builds. In the ip#127 proof run's CONTROL arm the apt layer is
          # `#12`, not `#10` — `#10` is a COPY. Anyone grepping `#10` in the
          # control log to check our work would find a COPY and conclude the proof
          # was fabricated. An unstable identifier can manufacture a refutation as
          # easily as a confirmation.
          #
          # These two CANNOT cache-hit in the shipped config. NOTE THE REASON HAS
          # CHANGED: it used to be "`base` is the whole image" (true when this was
          # single-stage). Since ip#132 split it, `base` is a thin preamble — but
          # un-caching a parent stage CASCADES to its children, so `builder` and
          # `runtime` rebuild too. MEASURED with a control (run 29141995875):
          # reading the same cache with NO filter, `[builder 4/4]` is CACHED; with
          # `no-cache-filters: base` it rebuilds. Post-ip#132 publishes therefore
          # still show ZERO `CACHED` lines (confirmed, run 29142394336).
          #
          # They are retained as the CONTROL ARM, not as an optimisation. If the
          # filter ever silently breaks (stage renamed, action input renamed, key
          # "tidied" back to the singular), `cache-from` serves the frozen apt
          # layer again and the old packages return. Delete it and the same
          # breakage is SILENT: nothing to serve, apt re-runs anyway, publish goes
          # green, and a WORKING filter and a COMPLETELY BROKEN one produce
          # byte-identical evidence. That is the self-certifying configuration
          # ip#127 existed to destroy.
          #
          # BOTH lines are load-bearing. `cache-to` is what keeps the detector
          # alive — GHA cache entries evict when unused, so dropping ONLY
          # `cache-to` silently empties `cache-from` and kills the guard without
          # touching it. Keep both or keep neither.
          #
          # WHAT THE DETECTOR NO LONGER GIVES YOU, and this is the important part:
          # it used to be read out by Trivy going RED. ip#132 removed
          # `build-essential` and `curl`, which brought in `linux-libc-dev` and
          # `libssh2-1t64` — the packages carrying 10 of the 10 HIGH CVEs. A frozen
          # `base` now has far less left to accumulate CVEs in, so that readout is
          # much weaker and may effectively stop firing. Good for security; bad for
          # the alarm. DO NOT rely on "Trivy goes red" as the tripwire. The
          # replacement is an explicit staleness check (`apt-get -s upgrade` against
          # the built image, OUTSIDE the build — inside a RUN it becomes part of the
          # layer it polices). Tracked in ip#137. `cache-from` creates the
          # condition; the tripwire reads it; NEITHER DOES ANYTHING ALONE.
          #
          # PRICED, finally, and in the right arm. Earlier numbers were all measured
          # in the wrong one: the ~80s was a `load: true` harness artefact; the 3.5s
          # uv saving exists only in the CONTROL arm and is unreachable once the
          # filter is on; "zero" ignored `cache-to` entirely. The real figures, off
          # the production publish (run 29142394336) — and note the export has TWO
          # phases; grepping only `sending` is how the number came out wrong:
          #
          #   cache-from  importing cache manifest ……………………………  0.1s  (free)
          #   cache-to    preparing build cache for export ……… 25.5s
          #   cache-to    sending cache export ………………………………… 63.1s   } 88.6s
          #
          # Hence `mode=min` below (ip#137). `mode=max` exports every stage's
          # layers including all of `builder`'s intermediates, which never appear in
          # the shipped image. `mode=min` exports only the final image's layers —
          # and MEASURED with a control (run 29142720595), the detector SURVIVES:
          # reading a `mode=min` cache, `[base 2/2]` still comes back CACHED, so a
          # broken filter can still be served a frozen layer. Export cost fell ~63%
          # in the scratch arm (60.4s -> 22.4s). The RATIO transfers; the ABSOLUTE
          # saving against the 88.6s above must be read off a real publish — do not
          # write down a production figure nobody has measured.
          #
          # Honest sensitivity — do not oversell this detector: it is NOT an instant
          # tripwire. With `cache-to` writing fresh layers each publish, a
          # newly-broken filter serves a layer at most one publish old, and the
          # readout only fires once something new lands against it. Days to weeks —
          # exactly the five days we lived through. That latency is the reason the
          # ip#137 tripwire exists.
          #
          # Whether ip#132's base/builder/runtime split restores caching is
          # UNTESTED and genuinely open: `builder` derives FROM `base`, so
          # un-caching the parent may cascade to its children — or may not, since
          # BuildKit keys a child on the parent's RESULT, and a re-run apt that
          # changes nothing produces an identical layer. Measure it. Do not write
          # down either answer.
          cache-from: type=gha,scope=workers
          cache-to: type=gha,mode=min,scope=workers
          # Exclude the `base` stage — the digest-pinned FROM plus the in-image
          # `apt-get -y upgrade` — from the layer cache, so the upgrade actually
          # RUNS on every publish instead of being replayed as a cached no-op.
          #
          # This is the ip#127 / noorinalabs-main#947 fix. Without it the GHA
          # cache served the apt layer (`#11 CACHED`) and the charter's declared
          # defense against within-tag package drift (tech-decisions.md § Base
          # Image Pinning) never executed: this publish sat red on `main` for
          # five days while 10 HIGH OS CVEs — all with published fixes — went
          # uninstalled, the package versions frozen to the 07-06 build. The
          # same frozen-layer shape is confirmed in noorinalabs-data-acquisition
          # (run 29138030830, a GREEN publish, `#11 CACHED` on its apt layer).
          #
          # `check_dockerfile_base_pin.py` proves the upgrade LINE is present.
          # It cannot prove the line RUNS. This flag is what makes it run, and
          # the two must be changed together: renaming or dropping the `base`
          # stage silently re-freezes the layer while that gate stays green.
          #
          # PLURAL. `no-cache-filters` is the ACTION INPUT; `--no-cache-filter`
          # (singular) is the docker CLI flag the action emits FROM this list
          # (action.yml declares only `no-cache-filters`; src/context.ts:72 reads
          # it, :163 loops it into `--no-cache-filter`). The singular spelling is
          # NOT a declared input — GitHub Actions does not fail on an undeclared
          # `with:` key, it drops it with a warning annotation, and actionlint
          # does not validate third-party input schemas. So the singular form
          # type-checks, lints, and builds green while the list stays EMPTY and
          # buildx never sees the flag: an inert fix that leaves the apt layer
          # frozen and makes it look like the cache was not the problem.
          no-cache-filters: base

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          # Scan by digest — guaranteed present immediately after push and
          # immune to tag-resolution races (user-service#61 retro).
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Summary
        if: always()
        run: |
          {
            echo "## GHCR Publish (workers): ${{ job.status }}"
            echo ""
            echo "- **Ref:** ${{ github.ref_name }}"
            echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE }}"
            echo "- **Platforms:** linux/amd64"
            echo "- **SHA:** ${{ github.sha }}"
            echo "- **Digest:** ${{ steps.build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
