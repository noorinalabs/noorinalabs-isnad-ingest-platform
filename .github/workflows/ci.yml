name: CI
on:
  pull_request:
    branches: [main, 'deployments/**']
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - run: uv sync
      - run: uv run ruff check src/ workers/ tests/
      - run: uv run ruff format --check src/ workers/ tests/
      - run: uv run mypy src/

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - run: uv sync
      - name: Check for known vulnerabilities
        run: |
          uv export --no-hashes --frozen --no-emit-project > /tmp/requirements.txt
          # GHSA-g75f-g53v-794x: bleach.linkify(parse_email=True) ReDoS — no
          # upstream fix released. parse_email is not used anywhere in this repo
          # (grep -rn parse_email is empty) → non-applicable. Tracked in
          # noorinalabs-main#703; revisit each wave for an upstream fix.
          uv run pip-audit --strict --desc --ignore-vuln GHSA-g75f-g53v-794x -r /tmp/requirements.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - run: uv sync
      - run: uv run pytest tests/ -v --tb=short -m "not integration"
        env:
          ENVIRONMENT: test

  precommit-ci-sync:
    # Phase-3 end-state criterion #6 (noorinalabs-main#327): the local
    # .pre-commit-config.yaml MUST mirror what CI enforces, so a developer's
    # commit/push fails fast instead of at PR time. This job is the machine
    # enforcement of that mirror: pre_commit_ci_sync.py parses both sides into
    # canonical check-kinds and fails the build on any CI-enforced kind that the
    # pre-commit config does NOT run locally. Wired UNSCOPED (default: every
    # workflow in .github/workflows/) so docs.yml's actionlint is in scope
    # alongside ci.yml's ruff/mypy/pytest — the pre-commit config mirrors all of
    # them. Only stdlib (argparse/re/pathlib) is used, so no uv sync is needed.
    name: precommit-ci-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pre-commit ⇄ CI sync-drift gate
        run: python3 .claude/lib/pre_commit_ci_sync.py .
      - name: Install pytest for the gate's unit tests
        # The gate itself is stdlib-only; its tests use pytest. This job does NOT
        # `uv sync` (it does not need the project deps), so install pytest alone.
        run: python3 -m pip install --quiet pytest
      - name: Sync-drift gate unit tests
        run: python3 -m pytest .claude/lib/tests/test_pre_commit_ci_sync.py -q
