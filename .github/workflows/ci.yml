name: CI
on:
  pull_request:
    branches: [main, 'deployments/**']
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - run: uv sync
      - run: uv run ruff check src/ workers/ tests/
      - run: uv run ruff format --check src/ workers/ tests/
      - run: uv run mypy src/

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - run: uv sync
      - name: Check for known vulnerabilities
        run: |
          uv export --no-hashes --frozen --no-emit-project > /tmp/requirements.txt
          # GHSA-g75f-g53v-794x: bleach.linkify(parse_email=True) ReDoS — no
          # upstream fix released. parse_email is not used anywhere in this repo
          # (grep -rn parse_email is empty) → non-applicable. Tracked in
          # noorinalabs-main#703; revisit each wave for an upstream fix.
          #
          # PYSEC-2026-1325 (aliases CVE-2024-23342 / GHSA-wj6h-64fc-37mp):
          # python-ecdsa Minerva timing attack on P-256. No upstream fix and none
          # coming — the project considers side-channel attacks out of scope.
          # `ecdsa` cannot be dropped: it is pulled by python-jose, which the
          # admin API genuinely uses.
          #
          # Non-applicable because the vulnerable primitive is UNREACHABLE, not
          # merely unused in one direction: src/api/auth.py:123,129 calls
          # jwt.decode(token, jwks, algorithms=["RS256"]). The allowlist is
          # RS256 — RSA. The advisory is a timing attack on ECDSA P-256 scalar
          # multiplication, a code path this repo never enters. `ecdsa` is
          # installed only because python-jose declares it.
          #
          # REVOKES THIS EXEMPTION: admitting an EC algorithm (ES256/ES384/
          # ES512) into that allowlist. If you change it, this ignore must be
          # re-justified — the "unreachable primitive" rationale dies there.
          # Tracked in ingest#128; revisit each wave.
          uv run pip-audit --strict --desc --ignore-vuln GHSA-g75f-g53v-794x --ignore-vuln PYSEC-2026-1325 -r /tmp/requirements.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - run: uv sync
      - run: uv run pytest tests/ -v --tb=short -m "not integration"
        env:
          ENVIRONMENT: test

  base-pin:
    # Charter-prose→code gate rolled in by #744 (built in noorinalabs-main#735):
    # every Dockerfile FROM must be digest-pinned (image:tag@sha256:<digest>) AND
    # carry the matching distro upgrade (apt for these slim images). Invokes the
    # stdlib-only `.claude/lib/check_dockerfile_base_pin.py` — no uv/node needed —
    # and is mirrored by the `dockerfile-base-pin` pre-commit hook. The
    # precommit-ci-sync gate classifies this kind, so dropping either the CI step
    # or the local hook is harmful drift. Kept as a single-line `run:` so the
    # line-scanner sync classifier registers the script name. Covers the top-level
    # multi-worker image and the four per-stage worker images. (No fixture-realism
    # step: this repo carries no Arabic NER/graph-load data fixtures.)
    name: Base-image pin + upgrade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dockerfile base-image pin + upgrade
        run: python3 .claude/lib/check_dockerfile_base_pin.py Dockerfile workers/dedup/Dockerfile workers/enrich/Dockerfile workers/ingest/Dockerfile workers/normalize/Dockerfile

  precommit-ci-sync:
    # Phase-3 end-state criterion #6 (noorinalabs-main#327): the local
    # .pre-commit-config.yaml MUST mirror what CI enforces, so a developer's
    # commit/push fails fast instead of at PR time. This job is the machine
    # enforcement of that mirror: pre_commit_ci_sync.py parses both sides into
    # canonical check-kinds and fails the build on any CI-enforced kind that the
    # pre-commit config does NOT run locally. Wired UNSCOPED (default: every
    # workflow in .github/workflows/) so docs.yml's actionlint is in scope
    # alongside ci.yml's ruff/mypy/pytest — the pre-commit config mirrors all of
    # them. Only stdlib (argparse/re/pathlib) is used, so no uv sync is needed.
    name: precommit-ci-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pre-commit ⇄ CI sync-drift gate
        run: python3 .claude/lib/pre_commit_ci_sync.py .
      - name: Install pytest for the .claude/lib unit tests
        # The gates are stdlib-only; their tests use pytest. This job does NOT
        # `uv sync` (it does not need the project deps), so install pytest alone.
        run: python3 -m pip install --quiet pytest
      - name: .claude/lib unit tests (sync-drift gate + base-pin check)
        # The main suite is testpaths = ["tests"], so the stdlib-only gate tests
        # under .claude/lib/tests/ (sync-drift classifier + check_dockerfile_base_pin)
        # are not collected by the `test` job. Run the whole dir here so both
        # gates' tests gate the PR.
        run: python3 -m pytest .claude/lib/tests/ -q
