# Pre-commit hooks for noorinalabs-isnad-ingest-platform
# Install:  uvx pre-commit install && uvx pre-commit install --hook-type pre-push
# Docs:     https://pre-commit.com/
#
# This MIRRORS the CI workflows so a local commit/push fails fast instead of
# surfacing a lint/format/type/test error only after a PR is opened (Phase-3
# end-state criterion #6 / noorinalabs-main#327). The `setup-hooks` Make target
# installs the framework standard the org uses, so the pre-commit <-> CI
# sync-drift gate (.claude/lib/pre_commit_ci_sync.py) can verify the mirror.
#
# Stage split:
#   pre-commit (fast, every commit) â€” ruff-format + ruff-lint over the python
#     surface, actionlint over the workflows (mirrors docs.yml's actionlint job),
#     and cspell over the authored-prose docs (mirrors docs.yml's spellcheck
#     job); all fast, no Docker.
#   pre-push   (heavier, every push) â€” mypy strict + the pytest suite + the
#     pip-audit vulnerability scan. These run the whole src/ + tests surface (or
#     resolve the full dependency set), so they're push-time not commit-time to
#     keep the commit loop snappy while still catching everything before the
#     code leaves the machine.
#
# CI parity notes (ingest-platform specifics):
#   * ci.yml's `lint-and-typecheck` job runs `ruff check`/`ruff format --check`
#     over `src/ workers/ tests/` and `mypy src/`. ruff runs here via the
#     ruff-pre-commit mirror PINNED to v0.15.11 (the org-canonical ruff pin â€”
#     keep in lockstep with sibling repos + CI). mypy is pre-push (heavier).
#   * ci.yml's `test` job runs `pytest -m "not integration"` with
#     ENVIRONMENT=test. The testcontainers integration tests (Neo4j / Postgres /
#     Kafka / MinIO) need Docker, so the pre-push pytest hook ALSO excludes them
#     (`-m "not integration"`) â€” local push stays fast and Docker-free, matching
#     what CI gates. Integration tests run via `make test-integration` when a
#     Docker daemon is available.
#   * ci.yml's `security-audit` job exports the frozen deps and runs
#     `pip-audit --strict --desc`. The pre-push `pip-audit` local hook mirrors
#     that command verbatim so the same vulnerability scan runs before code
#     leaves the machine. (Caught by the #577 run-block scan in the sync-drift
#     gate, which classifies tools invoked inside a `run: |` block.)
#   * The heavier hooks use `uv run` so the exact pinned tools from uv.lock run
#     locally, never a stray global mypy/pytest.
#   * actionlint is pinned (rhysd/actionlint v1.7.12) so the workflow-lint that
#     docs.yml enforces in CI also runs locally â€” keeping the UNSCOPED sync-drift
#     gate (which scans every workflow, docs.yml included) green.
#
# The kind-level mirror (ruff-lint, ruff-format, mypy, pytest, actionlint, cspell
# present on both sides) is enforced in CI by `.claude/lib/pre_commit_ci_sync.py`
# â€” if a future edit drops one side, that gate fails the build.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-format
        name: ruff-format
        files: ^(src|workers|tests)/
      - id: ruff
        args: [--fix]
        name: ruff-lint
        files: ^(src|workers|tests)/

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        name: actionlint (workflows)

  # cspell mirrors the `Spellcheck (cspell)` CI job in docs.yml (the sync-drift
  # gate now classifies the `cspell` kind â€” noorinalabs-main#684 â€” so a
  # CI-enforced spell gate not mirrored here turns the gate red, same contract as
  # actionlint above). New domain vocabulary then fails `pre-commit run` locally
  # instead of only surfacing as a CI red after push. Pinned to v8.4.0 of
  # cspell-cli to match the exact cspell the `streetsidesoftware/cspell-action@â€¦
  # v8.4.0` CI step bundles â€” same engine + dictionaries on both sides.
  # `language: node`, so pre-commit provisions its own node/cspell env (no system
  # cspell required).
  #
  # `files` is the regex equivalent of the CI action's authored-prose glob set
  # (the team charter, RUNBOOK, workers README); `--config .cspell.json` reuses
  # the same dictionaries + ignore rules CI loads, so a word that passes locally
  # passes in CI and vice-versa.
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v8.4.0
    hooks:
      - id: cspell
        name: cspell
        args: ["--no-must-find-files", "--no-progress", "--no-summary", "--config", ".cspell.json"]
        files: ^(\.claude/team/charter\.md|RUNBOOK\.md|workers/README\.md)$

  # Heavier checks run at pre-push (mirror CI's mypy + test + security-audit
  # jobs). Run as `local`/`system` hooks via `uv run` so the pinned tools from
  # uv.lock are used and never drift from CI.
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (pre-push)
        # Mirrors ci.yml's `security-audit` job verbatim: export the frozen
        # dependency set and audit it for known vulnerabilities. Heavier (needs
        # `uv export` + the advisory DB), so it runs pre-push. `bash -c` wraps
        # the exportâ†’audit pipeline as a single hook entry, matching the
        # sibling isnad-graph form.
        # --ignore-vuln GHSA-g75f-g53v-794x: bleach.linkify(parse_email=True)
        # ReDoS â€” no upstream fix; parse_email unused in this repo â†’ non-
        # applicable. Tracked in noorinalabs-main#703; revisit each wave. Kept
        # identical to ci.yml's security-audit invocation (localâ‡„CI parity).
        entry: bash -c 'uv export --no-hashes --frozen --no-emit-project > /tmp/requirements.txt && uv run pip-audit --strict --desc --ignore-vuln GHSA-g75f-g53v-794x -r /tmp/requirements.txt'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: mypy
        name: mypy-strict (pre-push)
        entry: uv run mypy src/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: pytest
        name: pytest (pre-push, unit only)
        entry: env ENVIRONMENT=test uv run pytest -m "not integration" -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
